<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – STARQ INDUSTRIEZ</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #E0E0E0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .auth-container {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 40px 35px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0, 243, 255, 0.05);
    }
    .logo h1 {
      color: #00f3ff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 6px;
    }
    .logo p {
      color: #888;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .toggle-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    .toggle-btns button {
      flex: 1;
      padding: 10px;
      background: #1E1E1E;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .toggle-btns button.active {
      background: #00f3ff;
      color: #0A0A0A;
      border-color: #00f3ff;
    }
    .toggle-btns button:hover { border-color: #00f3ff; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #0A0A0A;
      border: 1px solid #333;
      border-radius: 8px;
      color: #E0E0E0;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }
    .form-group input:focus { border-color: #00f3ff; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #00f3ff;
      color: #0A0A0A;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .btn-primary:hover {
      background: #00c8d4;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
    }
    .error-msg { color: #ff0055; font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 24px; }
    .success-msg { color: #39ff14; font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 24px; }
    .switch-text {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-top: 18px;
    }
    .switch-text span { color: #00f3ff; cursor: pointer; font-weight: 600; }
    .switch-text span:hover { text-decoration: underline; }
    .footer-text {
      text-align: center;
      color: #555;
      font-size: 0.75rem;
      margin-top: 25px;
      border-top: 1px solid #222;
      padding-top: 18px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="logo">
    <h1>⚡ STARQ INDUSTRIEZ</h1>
    <p>Secure. Simple. One-time payment.</p>
  </div>

  <div class="toggle-btns">
    <button id="loginToggle" class="active">Login</button>
    <button id="signupToggle">Sign Up</button>
  </div>

  <!-- ===== LOGIN FORM ===== -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="loginBtn">Login</button>
    <div id="loginError" class="error-msg"></div>
    <div id="loginSuccess" class="success-msg"></div>
  </div>

  <!-- ===== SIGN-UP FORM ===== -->
  <div id="signupForm" class="hidden">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your Name" />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="•••••••• (min 6 chars)" />
    </div>
    <button class="btn-primary" id="signupBtn">Create Account</button>
    <div id="signupError" class="error-msg"></div>
    <div id="signupSuccess" class="success-msg"></div>
  </div>

  <div class="switch-text">
    <span id="switchAction">Don't have an account? <span id="switchLink">Sign Up</span></span>
  </div>
  <div class="footer-text">© 2026 Starq Industriez</div>
</div>

<script>
  // ===================== FIREBASE CONFIG =====================
  const firebaseConfig = {
    apiKey: "AIzaSyDCE1PidwUCHPrccgcEn_EEr07IGB49n9A",
    authDomain: "starq-industriez.firebaseapp.com",
    projectId: "starq-industriez",
    storageBucket: "starq-industriez.firebasestorage.app",
    messagingSenderId: "841933358955",
    appId: "1:841933358955:web:8c7d87b2e8ff4ed42d6e2e"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ===================== DOM REFS =====================
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginToggle = document.getElementById('loginToggle');
  const signupToggle = document.getElementById('signupToggle');
  const switchLink = document.getElementById('switchLink');
  const switchAction = document.getElementById('switchAction');

  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const loginSuccess = document.getElementById('loginSuccess');

  const signupName = document.getElementById('signupName');
  const signupEmail = document.getElementById('signupEmail');
  const signupPassword = document.getElementById('signupPassword');
  const signupBtn = document.getElementById('signupBtn');
  const signupError = document.getElementById('signupError');
  const signupSuccess = document.getElementById('signupSuccess');

  // ===================== TOGGLE =====================
  function showLogin() {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    loginToggle.classList.add('active');
    signupToggle.classList.remove('active');
    switchAction.innerHTML = `Don't have an account? <span id="switchLink">Sign Up</span>`;
    document.getElementById('switchLink').addEventListener('click', showSignup);
    clearMessages();
  }
  function showSignup() {
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    signupToggle.classList.add('active');
    loginToggle.classList.remove('active');
    switchAction.innerHTML = `Already have an account? <span id="switchLink">Login</span>`;
    document.getElementById('switchLink').addEventListener('click', showLogin);
    clearMessages();
  }
  loginToggle.addEventListener('click', showLogin);
  signupToggle.addEventListener('click', showSignup);
  switchLink.addEventListener('click', showSignup);
  function clearMessages() {
    loginError.textContent = '';
    loginSuccess.textContent = '';
    signupError.textContent = '';
    signupSuccess.textContent = '';
  }

  // ===================== LOGIN =====================
  loginBtn.addEventListener('click', async () => {
    const email = loginEmail.value.trim();
    const password = loginPassword.value.trim();
    loginError.textContent = '';
    loginSuccess.textContent = '';
    if (!email || !password) {
      loginError.textContent = 'Please enter email and password.';
      return;
    }
    try {
      await auth.signInWithEmailAndPassword(email, password);
      loginSuccess.textContent = '✅ Login successful! Redirecting...';
      setTimeout(() => { window.location.href = 'home.html'; }, 1000);
    } catch (err) {
      loginError.textContent = err.message;
    }
  });

  // ===================== SIGN-UP (WITH FIRESTORE WRITE – FIXED) =====================
  signupBtn.addEventListener('click', async () => {
    const name = signupName.value.trim();
    const email = signupEmail.value.trim();
    const password = signupPassword.value.trim();
    signupError.textContent = '';
    signupSuccess.textContent = '';

    if (!name || !email || !password) {
      signupError.textContent = 'Please fill in all fields.';
      return;
    }
    if (password.length < 6) {
      signupError.textContent = 'Password must be at least 6 characters.';
      return;
    }

    try {
      // 1. Create Auth User
      const userCred = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCred.user;

      // 2. Update display name
      await user.updateProfile({ displayName: name });

      // 3. ✅ WRITE TO FIRESTORE (CORRECTED)
      await db.collection('users').doc(user.uid).set({
        name: name,
        email: email,
        starzBalance: 10,          // <-- CORRECT field name (with 'z')
        totalSpent: 0,
        rank: 'Cadet',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      signupSuccess.textContent = '✅ Account created! You earned 10 Starz! Redirecting...';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 1500);
    } catch (err) {
      signupError.textContent = '❌ ' + err.message;
      console.error('Signup error:', err);
    }
  });

  // ===================== AUTO-REDIRECT =====================
  auth.onAuthStateChanged((user) => {
    if (user) {
      window.location.href = 'home.html';
    }
  });
</script>
</body>
</html>
